
<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verse Roleplay</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
body {margin:0;font-family:'Poppins',sans-serif;background:#0f0f0f;color:white;overflow-x:hidden;}
header {position:fixed;top:0;width:100%;background:rgba(0,0,0,0.8);display:flex;align-items:center;justify-content:space-between;padding:10px 40px;z-index:1000;backdrop-filter:blur(10px);} 
header img {height:50px;}
nav a {color:white;margin:0 15px;text-decoration:none;position:relative;}
nav a::after {content:'';position:absolute;width:0;height:2px;background:#00c3ff;left:0;bottom:-5px;transition:0.3s;}
nav a:hover::after {width:100%;}
section {padding:120px 40px;min-height:100vh;}
.hero {display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;background:linear-gradient(135deg,#0f0f0f,#1a1a1a);} 
.hero h1 {font-size:60px;margin:20px 0;}
.hero p {font-size:20px;opacity:0.7;}
.btn {padding:15px 30px;background:#00c3ff;border:none;color:white;border-radius:30px;cursor:pointer;transition:0.3s;}
.btn:hover {transform:scale(1.1);} 
.card {background:#1a1a1a;padding:20px;border-radius:15px;transition:0.3s;}
.card:hover {transform:translateY(-10px);} 
.grid {display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;}
footer {background:#000;padding:40px;text-align:center;}
.fade {opacity:0;transform:translateY(20px);transition:1s;}
.fade.show {opacity:1;transform:translateY(0);} 
</style>
</head>
<body>
<header>
<img src="Verselogo.png" alt="Verse Logo">
<nav>
<a href="#home">Home</a>
<a href="#info">Info</a>
<a href="#staff">Staff</a>
<a href="#discord">Discord</a>
</nav>
</header>
<section class="hero" id="home">
<h1>Verse Roleplay</h1>
<p>De ultieme FiveM Roleplay ervaring</p>
<button class="btn">Join Nu</button>
</section>
<section id="info">
<h2>Server Informatie</h2>
<div class="grid">
<div class="card fade">Realistische RP</div>
<div class="card fade">Custom Scripts</div>
<div class="card fade">Actieve Community</div>
<div class="card fade">24/7 Staff</div>
</div>
</section>
<section id="staff">
<h2>Ons Staff Team</h2>
<div class="grid">
<div class="card fade">Owner</div>
<div class="card fade">Admin</div>
<div class="card fade">Moderator</div>
<div class="card fade">Support</div>
</div>
</section>
<section id="discord">
<h2>Join onze Discord</h2>
<p>Klik hieronder om lid te worden</p>
<button class="btn">Join Discord</button>
</section>
<footer>
<p>© 2026 Verse Roleplay</p>
</footer>
<script>
const faders = document.querySelectorAll('.fade');
window.addEventListener('scroll', () => {
faders.forEach(el => {
const rect = el.getBoundingClientRect();
if(rect.top < window.innerHeight - 50) {
el.classList.add('show');
}
});
});
</script>
</body>
</html>
